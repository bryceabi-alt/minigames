<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT SHS Quiz</title>

<style>
body {
    font-family: Arial;
    background: #e0f2fe;
    text-align: center;
}

.game-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.button {
    padding:10px 20px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.card {
    width:300px;
    height:220px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:20px;
    transition: transform 0.6s;
}

.flip {
    transform: rotateY(180deg);
}

.card-badge {
    background:#3b82f6;
    color:white;
    padding:5px 15px;
    border-radius:20px;
    display:inline-block;
    margin-top:10px;
}

.card-badge.easy { background:#22c55e; }
.card-badge.medium { background:#f59e0b; }
.card-badge.hard { background:#ef4444; }

.answer-option {
    margin:5px;
    padding:10px;
    border:1px solid #ccc;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="game-header">
    <button class="button" onclick="window.location.href='hub.html'">🔙 BACK TO HUB</button>
    <h2>ICT 20 QUESTIONS</h2>
    <div>Score: <span id="score">0</span></div>
</div>

<div class="card" id="card">
    <div id="question">Press Shuffle</div>
    <div class="card-badge" id="badge">ICT</div>
</div>

<br>

<button class="button" onclick="shuffle()">Shuffle</button>
<button class="button" onclick="flip()">Flip</button>

<div id="answers"></div>
<div id="explanation" style="margin-top:10px;"></div>

<div id="endScreen" style="display:none;">
    <h1>🎉 FINISHED</h1>
    <h2 style="font-size:40px;">🏆 SCORE: <span id="finalScore"></span></h2>
</div>

<script>

const questions = [
{ text:"What does ICT stand for?", correct:"Information and Communications Technology",
options:["Information Computer Technology","Internet Communication Technology","Information and Communications Technology","Integrated Computer Training"],
difficulty:"Easy", explanation:"ICT covers tools used to create, store, and share information like computers and networks."},

{ text:"Which component is the brain of the computer?", correct:"CPU",
options:["RAM","Hard Drive","CPU","GPU"],
difficulty:"Easy", explanation:"The CPU processes instructions and controls how the computer performs tasks."},

{ text:"What type of software manages hardware?", correct:"Operating System",
options:["Application","Compiler","Operating System","Utility"],
difficulty:"Easy", explanation:"The OS manages hardware, runs programs, and handles memory and files."},

{ text:"Which is a web browser?", correct:"Google Chrome",
options:["Explorer","Google Chrome","Word","Photoshop"],
difficulty:"Easy", explanation:"Browsers allow users to access and view websites on the internet."},

{ text:"What does URL mean?", correct:"Uniform Resource Locator",
options:["Universal Link","Uniform Resource Locator","Resource Link","Web Code"],
difficulty:"Medium", explanation:"A URL is the address used to locate a webpage online."},

{ text:"Which law protects data privacy?", correct:"Data Privacy Act of 2012 (RA 10173)",
options:["Cybercrime Act","E-Commerce Act","Data Privacy Act","FOI"],
difficulty:"Hard", explanation:"This law protects personal information and ensures responsible data handling."},

{ text:"What does a firewall do?", correct:"Monitors and controls network traffic",
options:["Stores files","Controls traffic","Manages RAM","Encrypts"],
difficulty:"Medium", explanation:"Firewalls block harmful access and protect systems from threats."},

{ text:"Which language structures web pages?", correct:"HTML",
options:["Python","Java","C++","HTML"],
difficulty:"Easy", explanation:"HTML defines the structure of webpages using tags and elements."},

{ text:"What is phishing?", correct:"Fake emails/websites to steal information",
options:["Hacking servers","Fake emails/websites to steal info","Antivirus","Encryption"],
difficulty:"Medium", explanation:"Phishing tricks users into giving passwords or personal data."},

{ text:"Which is cloud storage?", correct:"Google Drive",
options:["RAM","Google Drive","CPU","SSD"],
difficulty:"Easy", explanation:"Cloud storage allows access to files anytime using the internet."},

{ text:"What is an algorithm?", correct:"Step-by-step problem solving",
options:["Design tool","Step-by-step solution","Internet tool","Storage"],
difficulty:"Medium", explanation:"Algorithms are ordered steps used to solve problems or complete tasks."},

{ text:"Which memory is temporary?", correct:"RAM",
options:["ROM","HDD","RAM","SSD"],
difficulty:"Easy", explanation:"RAM stores temporary data and clears when power is turned off."},

{ text:"What does LAN mean?", correct:"Local Area Network",
options:["Large Network","Local Area Network","Linked Net","Access Node"],
difficulty:"Easy", explanation:"LAN connects devices within a small area like a school or office."},

{ text:"Role of ICT graduate?", correct:"Develop and manage tech solutions",
options:["Teach","Develop tech","Drive","Build"],
difficulty:"Medium", explanation:"ICT graduates build, manage, and troubleshoot technology systems."},

{ text:"Secure web protocol?", correct:"HTTPS",
options:["HTTP","FTP","HTTPS","SMTP"],
difficulty:"Medium", explanation:"HTTPS encrypts data to keep communication secure online."},

{ text:"What does SQL do?", correct:"Manage databases",
options:["Create sites","Manage databases","Edit videos","Design"],
difficulty:"Hard", explanation:"SQL is used to store, retrieve, and manage structured data."},

{ text:"ICT agency in PH?", correct:"DICT",
options:["DepEd","DOH","DICT","DSWD"],
difficulty:"Medium", explanation:"DICT leads ICT development and cybersecurity programs."},

{ text:"What is bandwidth?", correct:"Maximum data transfer rate",
options:["Storage","Speed","Max data rate","Resolution"],
difficulty:"Hard", explanation:"Bandwidth measures how much data can pass through a network."},

{ text:"Programming language?", correct:"Python",
options:["Windows","Excel","Python","Photoshop"],
difficulty:"Easy", explanation:"Python is used for coding, automation, and building applications."},

{ text:"What is UI/UX?", correct:"User Interface / User Experience",
options:["Input","User Interface / User Experience","Integration","Units"],
difficulty:"Medium", explanation:"UI is visual design, UX is how users feel when using a system."}
];

let deck = [];
let current = null;
let score = 0;

function shuffle(){
    deck = [...questions].sort(()=>Math.random()-0.5);
    document.getElementById("question").innerText="Ready!";
}

function flip(){
    if(deck.length===0){
        endGame();
        return;
    }

    current = deck.pop();

    let label = current.difficulty==="Easy" ? "🟢 EASY" :
                current.difficulty==="Medium" ? "🟡 MEDIUM" : "🔴 HARD";

    document.getElementById("card").classList.add("flip");

    setTimeout(()=>{
        document.getElementById("question").innerHTML =
        `<b>${label}</b><br>${current.text}`;

        let badge = document.getElementById("badge");
        badge.className="card-badge";
        badge.innerText = "ICT • " + current.difficulty.toUpperCase();
        badge.classList.add(current.difficulty.toLowerCase());

        showAnswers();

        document.getElementById("card").classList.remove("flip");
    },300);
}

function showAnswers(){
    let div = document.getElementById("answers");
    let exp = document.getElementById("explanation");

    div.innerHTML="";
    exp.innerHTML="";

    current.options.forEach(opt=>{
        let btn = document.createElement("div");
        btn.className="answer-option";
        btn.innerText=opt;

        btn.onclick=()=>{
            if(opt===current.correct){
                score++;
                document.getElementById("score").innerText=score;
            }

            exp.innerHTML = "💡 " + current.explanation;

            setTimeout(()=>flip(),3000);
        };

        div.appendChild(btn);
    });
}

function endGame(){
    document.getElementById("endScreen").style.display="block";
    document.getElementById("finalScore").innerText =
        score + " / " + questions.length;
}

</script>

</body>
</html>
